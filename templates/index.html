<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Project Vin</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: #fff;
    }

    .app-container {
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
    }

    .input-area {
        display: flex;
        padding: 10px;
        border-top: 1px solid #222;
    }

    #user-input {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        margin-left: 10px;
        padding: 12px;
        border: none;
        border-radius: 8px;
        background: #1f1f1f;
        color: white;
        cursor: pointer;
    }

    .message {
        margin: 8px 0;
        padding: 10px;
        border-radius: 8px;
        background: #1a1a1a;
    }

    .you {
        background: #2a2a2a;
    }

    .vin {
        background: #1c1c1c;
    }

    .system {
        font-size: 12px;
        opacity: 0.7;
        text-align: center;
    }

    .message img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 8px;
    }
</style>

</head><body><div class="app-container"><main class="main-panel">

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Talk to Vin...">
        <button onclick="handleMainAction()">Send</button>
    </div>

</main>

</div><!-- MODULES --><script src="{{ url_for('static', filename='modules/memory.js') }}"></script><script src="{{ url_for('static', filename='modules/chatbot.js') }}"></script><script>

let statusElement = null;

function addMessage(sender, text) {

    const chatBox = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.className = "message " + sender;

    const label = sender === "vin" ? "Vin" : sender;

    div.innerHTML = `<strong>${label}:</strong> ${text}`;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// =========================
// STATUS SYSTEM
// =========================

function showStatus(text) {

    const chatBox = document.getElementById("chat-box");

    statusElement = document.createElement("div");
    statusElement.className = "system";
    statusElement.innerHTML = `<em>${text}</em>`;

    chatBox.appendChild(statusElement);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function clearStatus() {
    if (statusElement) {
        statusElement.remove();
        statusElement = null;
    }
}

// =========================
// MAIN HANDLER
// =========================

async function handleMainAction() {

    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("you", text);
    input.value = "";

    try {

        showStatus("Thinking...");

        // Save user message
        Memory.add("user", text);

        // Send to OpenRouter
        const response = await chatWithAI(
            text,
            Memory.get()
        );

        // Save AI reply
        Memory.add("assistant", response);

        clearStatus();

        addMessage("vin", response);

    } catch (err) {

        console.error(err);

        clearStatus();

        addMessage("vin", "Error occurred.");

    }
}


// ENTER SUPPORT

document.getElementById("user-input")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") handleMainAction();
});

</script></body>
</html>
