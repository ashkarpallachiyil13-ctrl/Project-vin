<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Project Vin</title>

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="app-container">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h1 class="logo">PROJECT VIN</h1>

            <button onclick="switchMode('chat')">
                Chat
            </button>

            <button onclick="switchMode('image')">
                Image Generator
            </button>

            <button onclick="switchMode('analyze')">
                Image Analysis
            </button>

            <button onclick="switchMode('translate')">
                Translator
            </button>

            <button onclick="switchMode('emotion')">
                Emotion Analysis
            </button>

            <button onclick="switchMode('code')">
                Code Assistant
            </button>

            <button onclick="switchMode('voice')">
                Voice
            </button>

            <button onclick="switchMode('web')">
                Web Search
            </button>

        </aside>


        <!-- Main -->
        <main class="main-panel">

            <div class="chat-box" id="chat-box"></div>

            <div class="input-area">

                <input
                    type="text"
                    id="user-input"
                    placeholder="Talk to Vin..."
                >

                <button onclick="handleMainAction()">
                    Send
                </button>

            </div>


            <!-- Extra Containers -->

            <div id="image-container"></div>

            <div id="voice-container"></div>

            <div id="emotion-container"></div>

            <div id="stream-output"></div>

        </main>

    </div>


    <!-- Puter SDK -->
    <script src="https://js.puter.com/v2/"></script>


    <!-- MODULES -->

    <script src="{{ url_for('static', filename='modules/chatbot.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/image_gen.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/image_analysis.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/tool.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/stream.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/temp.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/web.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/voice.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/codex.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/translator.js') }}"></script>

    <script src="{{ url_for('static', filename='modules/emo.js') }}"></script>


    <!-- MAIN UI SCRIPT -->

    <script>

        let currentMode = "chat";


        function switchMode(mode) {

            currentMode = mode;

            addMessage(
                "system",
                `Mode switched to ${mode}`
            );
        }


        function addMessage(sender, text) {

            const chatBox =
                document.getElementById("chat-box");

            const div = document.createElement("div");

            div.className = sender;

            div.innerHTML = `
                <strong>${sender}:</strong>
                ${text}
            `;

            chatBox.appendChild(div);

            chatBox.scrollTop =
                chatBox.scrollHeight;
        }


        async function handleMainAction() {

            const input =
                document.getElementById("user-input");

            const text = input.value;

            if (!text.trim()) {
                return;
            }

            addMessage("you", text);

            input.value = "";


            try {

                switch(currentMode) {

                    case "chat": {

                        const response =
                            await puter.ai.chat(
                                text,
                                {
                                    model: "gpt-5.4-nano"
                                }
                            );

                        addMessage("vin", response);

                        break;
                    }


                    case "image": {

                        await generateImage(text);

                        addMessage(
                            "vin",
                            "Image generated successfully."
                        );

                        break;
                    }


                    case "analyze": {

                        const result =
                            await analyzeImage(text);

                        addMessage("vin", result);

                        break;
                    }


                    case "translate": {

                        const translated =
                            await translateText(
                                text,
                                "Malayalam"
                            );

                        addMessage("vin", translated);

                        break;
                    }


                    case "emotion": {

                        const emotion =
                            await analyzeEmotion(text);

                        displayEmotion(emotion);

                        addMessage(
                            "vin",
                            `${emotion.sentiment} (${(emotion.confidence * 100).toFixed(1)}%)`
                        );

                        break;
                    }


                    case "code": {

                        const code =
                            await generateCode(text);

                        addMessage("vin", `<pre>${code}</pre>`);

                        break;
                    }


                    case "voice": {

                        await speakText(text);

                        addMessage(
                            "vin",
                            "Voice generated."
                        );

                        break;
                    }


                    case "web": {

                        const result =
                            await askWeb(text);

                        addMessage("vin", result);

                        break;
                    }
                }

            } catch(error) {

                console.error(error);

                addMessage(
                    "vin",
                    "Something went wrong."
                );
            }
        }


        document
            .getElementById("user-input")
            .addEventListener("keypress", function(e) {

                if (e.key === "Enter") {
                    handleMainAction();
                }
            });

    </script>

</body>
</html>
