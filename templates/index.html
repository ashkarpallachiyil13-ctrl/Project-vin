<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Project Vin</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>
    /* basic safety fallback styling for scroll + chat */
    body {
        margin: 0;
        font-family: Arial, sans-serif;
    }

    .app-container {
        display: flex;
        height: 100vh;
        overflow: hidden;
    }

    .main-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    .chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }

    .input-area {
        display: flex;
        padding: 10px;
    }

    #user-input {
        flex: 1;
        padding: 10px;
    }

    button {
        padding: 10px;
    }

    .message img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 5px;
    }

    .system {
        opacity: 0.7;
        font-size: 12px;
    }
</style>

</head><body><div class="app-container"><main class="main-panel">

    <div class="chat-box" id="chat-box"></div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Talk to Vin...">
        <button onclick="handleMainAction()">Send</button>
    </div>

</main>

</div><script src="https://js.puter.com/v2/"></script><!-- MODULES --><script src="{{ url_for('static', filename='modules/chatbot.js') }}"></script><script src="{{ url_for('static', filename='modules/image_gen.js') }}"></script><script src="{{ url_for('static', filename='modules/image_analysis.js') }}"></script><script src="{{ url_for('static', filename='modules/stream.js') }}"></script><script src="{{ url_for('static', filename='modules/temp.js') }}"></script><script src="{{ url_for('static', filename='modules/web.js') }}"></script><script src="{{ url_for('static', filename='modules/voice.js') }}"></script><script src="{{ url_for('static', filename='modules/codex.js') }}"></script><script src="{{ url_for('static', filename='modules/translator.js') }}"></script><script src="{{ url_for('static', filename='modules/emo.js') }}"></script><script>

let currentMode = "chat";

function addMessage(sender, text) {

    const chatBox = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.className = "message " + sender;

    div.innerHTML = `<strong>${sender === 'vin' ? 'Vin' : sender}:</strong> ${text}`;

    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function showStatus(text) {
    addMessage("system", text);
}

async function handleMainAction() {

    const input = document.getElementById("user-input");
    const text = input.value;

    if (!text.trim()) return;

    addMessage("you", text);
    input.value = "";

    try {

        // default status
        showStatus("Typing...");

        const intent = detectIntent(text);
        const emotion = await analyzeEmotion(text);

        // =====================
        // IMAGE
        // =====================
        if (intent === "image") {

            showStatus("Generating image...");

            const img = await generateImage(text);

            const chatBox = document.getElementById("chat-box");
            const div = document.createElement("div");

            div.className = "message vin";
            div.innerHTML = `<strong>Vin:</strong><br>`;
            div.appendChild(img);

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            return;
        }

        // =====================
        // TRANSLATE
        // =====================
        if (intent === "translate") {

            showStatus("Translating...");

            const translated = await translateText(text);

            addMessage("vin", translated);

            return;
        }

        // =====================
        // CHAT (STREAM OR NORMAL)
        // =====================

        const response = await puter.ai.chat(text, {
            model: "gpt-5.4-nano"
        });

        addMessage("vin", response);

    } catch (err) {
        console.error(err);
        addMessage("vin", "Error occurred.");
    }
}


function detectIntent(text) {

    const t = text.toLowerCase();

    if (
        t.includes("generate image") ||
        t.includes("create image") ||
        t.includes("draw") ||
        t.includes("show me")
    ) return "image";

    if (
        t.includes("how do i say") ||
        t.includes("translate") ||
        t.includes("in german") ||
        t.includes("in french")
    ) return "translate";

    return "chat";
}


document.getElementById("user-input")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") handleMainAction();
});

</script></body>
</html>
