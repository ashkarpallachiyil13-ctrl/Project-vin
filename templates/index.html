<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Vin</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="app-container">

    <main class="main-panel">

        <div class="chat-box" id="chat-box"></div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Talk to Vin..." autocomplete="off">
            <button onclick="handleMainAction()">Send</button>
        </div>

    </main>

</div>

<!-- MODULES -->
<script src="{{ url_for('static', filename='modules/memory.js') }}"></script>
<script src="{{ url_for('static', filename='modules/chatbot.js') }}"></script>

<script>
let statusElement = null;

// MESSAGE
function addMessage(sender, text) {

    const chatBox = document.getElementById("chat-box");

    const div = document.createElement("div");
    div.className = "message " + sender;

    const strong = document.createElement("strong");
    strong.textContent = sender === "vin" ? "Vin: " : "You: ";

    const span = document.createElement("span");
    span.textContent = text;

    div.appendChild(strong);
    div.appendChild(span);

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// STATUS
function showStatus(text) {
    const chatBox = document.getElementById("chat-box");

    statusElement = document.createElement("div");
    statusElement.className = "system";
    statusElement.textContent = text;

    chatBox.appendChild(statusElement);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function clearStatus() {
    if (statusElement) {
        statusElement.remove();
        statusElement = null;
    }
}

// MAIN
async function handleMainAction() {

    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    addMessage("you", text);
    input.value = "";

    try {

        showStatus("Thinking...");

        // 🚨 NO MEMORY NOW
        const response = await chatWithAI(text, []);

        clearStatus();

        addMessage("vin", response);

    } catch (err) {

        console.error("FULL ERROR:", err);

        clearStatus();

        addMessage("vin", err.message || "Error occurred.");
    }
}

// ENTER KEY
document.getElementById("user-input")
.addEventListener("keypress", function(e) {
    if (e.key === "Enter") handleMainAction();
});
</script>

</body>
</html>
